<!DOCTYPE html>  
<html>  
<head>  
<title>Student Login</title>  
  
<style>  
body{  
  margin:0;  
  height:100vh;  
  display:flex;  
  justify-content:center;  
  align-items:center;  
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);  
  font-family:Arial;  
  color:white;  
}  
  
.box{  
  width:320px;  
  padding:25px;  
  background:rgba(255,255,255,0.08);  
  backdrop-filter:blur(12px);  
  border-radius:20px;  
  text-align:center;  
  background-image: url("wmo.jpg");  
      background-size: cover;  
      background-repeat: no-repeat;  
      background-position: center;  
        
}  
  
input{  
  width:100%;  
  padding:12px;  
  margin-top:10px;  
  border:none;  
  border-radius:10px;  
}  
  
button{  
  width:100%;  
  padding:12px;  
  margin-top:15px;  
  border:none;  
  border-radius:10px;  
  background:#00bfff;  
  font-weight:bold;  
  cursor:pointer;  
}  
</style>  
</head>  
  
<body>  
  
<div class="box">  
  <h2>Student Login</h2>  
  
  <input id="id" placeholder="Enter Student ID">  
  <button id="loginBtn">Login</button>  
  
  <p id="msg"></p>  
</div>  
  
<script type="module">  
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";  
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";  
  
const firebaseConfig = {  
  apiKey: "AIzaSyADbSzFOg0VLXm9YSLqRHg-5PEXKXIhwzk",  
  authDomain: "der-firebase.firebaseapp.com",  
  projectId: "der-firebase",  
  storageBucket: "der-firebase.firebasestorage.app",  
  messagingSenderId: "898462725543",  
  appId: "1:898462725543:web:e7741dc7191c71a70bf282"  
};  
  
const app = initializeApp(firebaseConfig);  
const db = getDatabase(app);  
  
/* 🔐 LOGIN ONLY BY ID */  
document.getElementById("loginBtn").addEventListener("click", () => {  
  
  const id = document.getElementById("id").value;  
  const msg = document.getElementById("msg");  
  
  onValue(ref(db,"students"), (snapshot) => {  
  
    let found = false;  
  
    snapshot.forEach(child => {  
  
      const s = child.val();  
  
      if(s.id === id){  
        found = true;  
  
        localStorage.setItem("student", JSON.stringify(s));  
  
        window.location.href = "dashboard.html";  
      }  
  
    });  
  
    if(!found){  
      msg.style.color = "red";  
      msg.innerText = "Student ID not found";  
    }  
  
  }, { onlyOnce: true });  
  
});  
  
</script>  
  
</body>  
</html>
