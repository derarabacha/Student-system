<html>      
  <head>      
    <title>Register</title>      
    <style>      
  
    body {      
      font-family: Arial, sans-serif;      
      background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);      
      display: flex;      
      justify-content: center;      
      align-items: center;      
      height: 100vh;      
      margin:0;  
      overflow:hidden;  
    }      
      
    .container {      
      background: rgba(255,255,255,0.12);      
      backdrop-filter: blur(12px);      
      padding: 30px;      
      border-radius: 20px;      
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);      
      width: 350px;      
      border:1px solid rgba(255,255,255,0.2);  
  
      background-image: url("wmo.jpg");      
      background-size: cover;      
      background-repeat: no-repeat;      
      background-position: center;      
  
      animation: fadeIn 1s ease;  
    }      
      
    h1 {      
      text-align: center;      
      margin-bottom: 20px;      
      color: white;      
      font-size: 34px;  
      letter-spacing:1px;  
      text-shadow: 2px 2px 5px black;  
    }      
      
    label {      
      display: block;      
      margin-bottom: 5px;      
      color: white;      
      font-weight: bold;      
      text-shadow:1px 1px 3px black;  
    }      
      
    input {      
      width: 100%;      
      padding: 12px;      
      margin-bottom: 15px;      
      border: none;      
      border-radius: 10px;      
      box-sizing: border-box;      
      background: rgba(255,255,255,0.85);  
      transition: 0.3s;  
      font-size:15px;  
    }      
      
    input:focus {      
      border: 2px solid #00bfff;      
      outline: none;      
      box-shadow: 0 0 10px #00bfff;  
      transform: scale(1.02);  
    }      
      
    button {      
      width: 100%;      
      background: linear-gradient(45deg,#2563eb,#00bfff);      
      color: white;      
      padding: 12px;      
      border: none;      
      border-radius: 10px;      
      cursor: pointer;      
      font-size: 17px;      
      font-weight:bold;  
      transition: 0.3s;  
      box-shadow:0 5px 15px rgba(0,0,0,0.3);  
    }      
      
    button:hover {      
      background: linear-gradient(45deg,#1d4ed8,#38bdf8);      
      transform: translateY(-3px);  
    }      
      
    button:active{      
      background-color: green;      
      color: black;      
      transform: scale(0.98);  
    }      
      
    .note {      
      text-align: center;      
      font-size: 14px;      
      margin-top: 12px;      
      color: white;      
      text-shadow:1px 1px 3px black;  
    }      
  
    .note a{  
      color: yellow;  
      text-decoration:none;  
      font-weight:bold;  
    }  
  
    .note a:hover{  
      text-decoration:underline;  
    }  
  
    select{      
        width:100%;  
        margin-bottom: 15px;      
        padding: 12px;      
        border:none;  
        border-radius:10px;  
        background: rgba(255,255,255,0.85);  
        font-size:15px;  
    }      
  
    #message{  
      text-align:center;  
      font-weight:bold;  
      margin-top:10px;  
      color:yellow;  
      text-shadow:1px 1px 3px black;  
    }  
  
    @keyframes fadeIn{  
      from{  
        opacity:0;  
        transform: translateY(20px);  
      }  
      to{  
        opacity:1;  
        transform: translateY(0);  
      }  
    }  
  
    </style>      
  </head>      
  
  <body>      
  
    <section class="container">      
  
      <h1>Register</h1>      
  
      <form action="#" method="post">      
  
     <label for="fullname">Full Name</label>      
  
      <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>      
  
      <label for="email">Email</label>      
  
      <input type="email" id="email" name="email" placeholder="Enter your email" required>      
             
      <label for="tel">phone Number</label>      
  
      <input type="tel" id="tel" name="tel" placeholder="Enter your number">      
  
      <label for="password">Password</label>      
  
      <input type="password" id="password" name="password" placeholder="Enter password" required>      
  
         <label for="gender">Gender</label>      
  
         <select name="Gender" id="gender">      
  
            <option value="Choice gender">neither</option>      
  
            <option value="Male">Male</option>      
  
            <option value="Female">Female</option>      
  
         </select>      
  
    <button type="button" onclick="register()">Register</button>      
  
<p id="message"></p>      
  
    </form>      
  
    <p class="note">Already have an account? <a href="Login.html">Login</a></p>      
  
    </section>      
  
    <script type="module">      
      
    // Import Firebase      
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";      
      
    import {      
      getAuth,      
      createUserWithEmailAndPassword      
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";      
      
// Your Firebase Config      
const firebaseConfig = {      
  apiKey: "AIzaSyADbSzFOg0VLXm9YSLqRHg-5PEXKXIhwzk",      
  authDomain: "der-firebase.firebaseapp.com",      
  projectId: "der-firebase",      
  storageBucket: "der-firebase.firebasestorage.app",      
  messagingSenderId: "898462725543",      
  appId: "1:898462725543:web:e7741dc7191c71a70bf282"      
};      
          
      
    // Initialize Firebase      
    const app = initializeApp(firebaseConfig);      
      
    const auth = getAuth(app);      
  
    // Register Function      
    window.register = function() {      
  
      const email = document.getElementById("email").value;      
      
      const password = document.getElementById("password").value;      
      
      createUserWithEmailAndPassword(auth, email, password)      
      
      .then((userCredential) => {      
      
        document.getElementById("message").innerHTML =      
          "Registration Successful";      
      
      })      
      
      .catch((error) => {      
      
        document.getElementById("message").innerHTML =      
          error.message;      
      
      });      
      
   };      
      
  </script>      
      
  </body>      
</html>
