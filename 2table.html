<!DOCTYPE html>
<html>
<head>

<title>Student Table</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


body{

background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
min-height:100vh;
padding:20px;
color:white;

}


/* TOGGLE */

.menu-btn{

width:40px;
height:30px;
position:fixed;
top:20px;
left:20px;
cursor:pointer;
z-index:1001;
display:flex;
flex-direction:column;
justify-content:space-between;

}


.menu-btn span{

height:4px;
width:40px;
background:white;
border-radius:10px;
transition:.4s;

}


.menu-btn.active span:nth-child(1){

transform:rotate(45deg) translate(9px,9px);

}


.menu-btn.active span:nth-child(2){

opacity:0;

}


.menu-btn.active span:nth-child(3){

transform:rotate(-45deg) translate(9px,-9px);

}


/* SIDEBAR */

.sidebar{

width:250px;
height:100vh;
position:fixed;
top:0;
left:-260px;
background:rgba(0,0,0,.85);
padding-top:70px;
transition:.4s;
z-index:1000;
backdrop-filter:blur(10px);

}


.sidebar.active{

left:0;

}


.sidebar a{

display:block;
padding:18px;
color:white;
text-decoration:none;
font-size:18px;
border-bottom:1px solid #444;

}


.sidebar a:hover{

background:#2563eb;

}



/* TITLE */

.header{

text-align:center;
margin-top:60px;

}


.header h1{

font-size:40px;

}


/* TABLE BOX */

.table-box{

margin-top:40px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
overflow:auto;

}



table{

width:100%;
border-collapse:collapse;

}


th{

background:rgba(255,255,255,.25);
padding:15px;
font-size:17px;

}


td{

padding:14px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.2);

}


tr:hover{

background:rgba(255,255,255,.1);

}



</style>

</head>


<body>


<div class="menu-btn" id="menuBtn">

<span></span>
<span></span>
<span></span>

</div>



<div class="sidebar" id="sidebar">


<a href="index.html">
📝 Add Student
</a>


<a href="private t.html">
🔐 Private Mark
</a>


<a href="index.html">
🚪 Logout
</a>


</div>




<div class="header">

<h1>STUDENT TABLE</h1>

<p>Student Ranking & Performance Dashboard</p>

</div>





<div class="table-box">


<table>


<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Maths</th>
<th>Chemistry</th>
<th>Physics</th>
<th>Biology</th>
<th>Total</th>
<th>Average</th>

</tr>


</thead>


<tbody id="studentTable">


</tbody>


</table>


</div>







<script type="module">


import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {getDatabase,ref,onValue}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";




const firebaseConfig = {


apiKey:"AIzaSyADbSzFOg0VLXm9YSLqRHg-5PEXKXIhwzk",

authDomain:"der-firebase.firebaseapp.com",

databaseURL:"https://der-firebase-default-rtdb.firebaseio.com",

projectId:"der-firebase",

storageBucket:"der-firebase.firebasestorage.app",

messagingSenderId:"898462725543",

appId:"1:898462725543:web:e7741dc7191c71a70bf282"


};



const app = initializeApp(firebaseConfig);


const db = getDatabase(app);





const table = document.getElementById("studentTable");





// REALTIME CONNECTION


onValue(ref(db,"students"),(snapshot)=>{


table.innerHTML="";


snapshot.forEach((child)=>{


let s = child.val();



table.innerHTML += `

<tr>

<td>${s.id}</td>

<td>${s.name}</td>

<td>${s.maths}</td>

<td>${s.chemistry}</td>

<td>${s.physics}</td>

<td>${s.biology}</td>

<td>${s.total}</td>

<td>${Number(s.average).toFixed(2)}</td>


</tr>


`;



});


});







// SIDEBAR


const menu=document.getElementById("menuBtn");

const sidebar=document.getElementById("sidebar");



menu.onclick=()=>{


menu.classList.toggle("active");

sidebar.classList.toggle("active");


};



</script>


</body>
</html>
