<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Table</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:linear-gradient(135deg,#0b1a3a,#1e3a8a,#2563eb);
  min-height:100vh;
  color:white;
}

/* TOP BAR */
.topbar{
  padding:15px;
}

/* 🔥 TOGGLE BUTTON (X ONLY) */
.menu{
  width:40px;
  height:30px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
  z-index:1001;
}

.menu span{
  height:4px;
  background:white;
  border-radius:5px;
  transition:0.4s;
}

/* X animation */
.menu.active span:nth-child(1){
  transform:rotate(45deg) translate(7px,7px);
}

.menu.active span:nth-child(2){
  opacity:0;
}

.menu.active span:nth-child(3){
  transform:rotate(-45deg) translate(7px,-7px);
}

/* 🔥 SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-250px;
  width:220px;
  height:100%;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  padding-top:60px;
  transition:0.4s;
  z-index:1000;
}

.sidebar a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

.sidebar a:hover{
  background:#00bfff;
  color:black;
}

.sidebar.active{
  left:0;
}

/* TITLE */
.title{
  text-align:center;
  margin-top:10px;
}

.title h1{
  font-size:32px;
}

.title p{
  opacity:0.9;
}

/* TABLE */
.table-container{
  margin:30px auto;
  width:95%;
  max-width:1100px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
  background:rgba(255,255,255,0.15);
}

tr:hover{
  background:rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="admin.html">📊 Students Data</a>
  <a href="#">🔐 Private Mark</a>
  <a href="index.html">🚪 Logout</a>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menu" id="menuBtn">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- TITLE -->
<div class="title">
  <h1>STUDENT TABLE</h1>
  <p>Student Ranking & Performance Dashboard</p>
</div>

<!-- TABLE -->
<div class="table-container">

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Maths</th>
      <th>Chemistry</th>
      <th>Physics</th>
      <th>Biology</th>
      <th>Total</th>
      <th>Average</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>
</table>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "...",
  authDomain: "...",
  databaseURL: "...",
  projectId: "..."
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 👇 THIS IS WHERE onValue GOES
const tbody = document.querySelector("tbody");

onValue(ref(db, "students"), (snapshot) => {
  tbody.innerHTML = "";

  snapshot.forEach((child) => {
    const s = child.val();

    tbody.innerHTML += `
      <tr>
        <td>${s.id}</td>
        <td>${s.name}</td>
        <td>${s.maths}</td>
        <td>${s.chemistry}</td>
        <td>${s.physics}</td>
        <td>${s.biology}</td>
        <td>${s.total}</td>
        <td>${Number(s.average).toFixed(2)}</td>
      </tr>
    `;
  });
});

</script>

<!-- TOGGLE SCRIPT -->
<script>
const menu = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");

menu.addEventListener("click", ()=>{
  menu.classList.toggle("active");
  sidebar.classList.toggle("active");
});
</script>

</body>
</html>
