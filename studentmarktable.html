<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Table</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:linear-gradient(135deg,#0b1a3a,#1e3a8a,#2563eb);
  min-height:100vh;
  color:white;
}

.topbar{ padding:15px; }

.menu{
  width:40px;
  height:30px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
  z-index:1001;
}

.menu span{
  height:4px;
  background:white;
  border-radius:5px;
  transition:0.4s;
}

.sidebar{
  position:fixed;
  top:0;
  left:-250px;
  width:220px;
  height:100%;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  padding-top:60px;
  transition:0.4s;
  z-index:1000;
}

.sidebar a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

.sidebar a:hover{
  background:#00bfff;
  color:black;
}

.sidebar.active{ left:0; }

.title{
  text-align:center;
  margin-top:10px;
}

.title h1{ font-size:32px; }
.title p{ opacity:0.9; }

.table-container{
  margin:30px auto;
  width:95%;
  max-width:1100px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

th{ background:rgba(255,255,255,0.15); }
tr:hover{ background:rgba(255,255,255,0.08); }
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <a href="admin.html">📊 Add Students Data</a>
  <a href="private t.html">🔐 Private Mark</a>
  <a href="index.html">🚪 Logout</a>
</div>

<div class="topbar">
  <div class="menu" id="menuBtn">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<div class="title">
  <h1>STUDENT TABLE</h1>
  <p>Student Ranking & Performance Dashboard</p>
</div>

<div class="table-container">
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Maths</th>
      <th>Chemistry</th>
      <th>Physics</th>
      <th>Biology</th>
      <th>Total</th>
      <th>Average</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADbSzFOg0VLXm9YSLqRHg-5PEXKXIhwzk",
  authDomain: "der-firebase.firebaseapp.com",
  databaseURL: "https://der-firebase-default-rtdb.firebaseio.com",
  projectId: "der-firebase",
  storageBucket: "der-firebase.firebasestorage.app",
  messagingSenderId: "898462725543",
  appId: "1:898462725543:web:e7741dc7191c71a70bf282"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const tbody = document.getElementById("tableBody");

// Reads ALL students under the "students" node
onValue(ref(db, "students"), (snapshot) => {
  tbody.innerHTML = ""; // Clear existing table rows

  if(!snapshot.exists()){
    tbody.innerHTML = "<tr><td colspan='8'>No students found. Add some from Admin!</td></tr>";
    return;
  }

  snapshot.forEach((child) => {
    const s = child.val();
    
    // Safety check if total or average are saved as objects or raw properties
    const displayTotal = typeof s.maths === "object" ? (s.total || 0) : (Number(s.maths || 0) + Number(s.chemistry || 0) + Number(s.physics || 0) + Number(s.biology || 0));
    const displayAverage = typeof s.maths === "object" ? (s.average || 0) : (displayTotal / 4);

    // Dynamic extraction handling simple data patterns or structured objects
    const mathsScore = typeof s.maths === "object" ? (s.maths?.total || "-") : (s.maths ?? "-");
    const chemScore = typeof s.chemistry === "object" ? (s.chemistry?.total || "-") : (s.chemistry ?? "-");
    const physScore = typeof s.physics === "object" ? (s.physics?.total || "-") : (s.physics ?? "-");
    const bioScore = typeof s.biology === "object" ? (s.biology?.total || "-") : (s.biology ?? "-");

    tbody.innerHTML += `
      <tr>
        <td>${s.id || child.key}</td>
        <td>${s.name || "Unnamed"}</td>
        <td>${mathsScore}</td>
        <td>${chemScore}</td>
        <td>${physScore}</td>
        <td>${bioScore}</td>
        <td>${displayTotal}</td>
        <td>${Number(displayAverage).toFixed(2)}</td>
      </tr>
    `;
  });
});
</script>

<script>
const menu = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");

menu.onclick = () => {
  menu.classList.toggle("active");
  sidebar.classList.toggle("active");
};
</script>

</body>
</html>
