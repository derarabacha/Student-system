<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Student Table</title>  
  
<style>  
*{  
  margin:0;  
  padding:0;  
  box-sizing:border-box;  
  font-family:Arial, sans-serif;  
}  
  
body{  
  background: linear-gradient(135deg,#0b1a3a,#1e3a8a,#2563eb);  
  min-height:100vh;  
  color:white;  
}  
  
/* top bar */  
.topbar{  
  display:flex;  
  align-items:center;  
  justify-content:space-between;  
  padding:15px 20px;  
}  
  
.menu{  
  font-size:28px;  
  cursor:pointer;  
}  
  
/* title */  
.title{  
  text-align:center;  
  margin-top:10px;  
}  
  
.title h1{  
  font-size:32px;  
  letter-spacing:2px;  
}  
  
.title p{  
  margin-top:8px;  
  font-size:18px;  
  opacity:0.9;  
}  
  
/* table container */  
.table-container{  
  margin:30px auto;  
  width:95%;  
  max-width:1100px;  
}  
  
/* header row */  
.table-header{  
  display:grid;  
  grid-template-columns:repeat(8,1fr);  
  background: linear-gradient(90deg,#00c6ff,#0072ff);  
  border-radius:15px;  
  overflow:hidden;  
  box-shadow:0 10px 20px rgba(0,0,0,0.3);  
}  
  
.table-header div{  
  padding:15px;  
  text-align:center;  
  font-weight:bold;  
  border-right:1px solid rgba(255,255,255,0.2);  
}  
  
.table-header div:last-child{  
  border-right:none;  
}  
  
/* table rows */  
table{  
  width:100%;  
  margin-top:10px;  
  border-collapse:collapse;  
  background:rgba(255,255,255,0.05);  
  backdrop-filter: blur(10px);  
  border-radius:10px;  
  overflow:hidden;  
}  
  
th,td{  
  padding:12px;  
  text-align:center;  
  border-bottom:1px solid rgba(255,255,255,0.1);  
}  
  
th{  
  background:rgba(255,255,255,0.1);  
}  
  
tr:hover{  
  background:rgba(255,255,255,0.08);  
}  
</style>  
</head>  
  
<body>  
  
<div class="topbar">  
  <div class="menu" id="menuBtn">☰</div>  
</div>  
  
<div class="title">  
  <h1>STUDENT TABLE</h1>  
  <p>Student Ranking & Performance Dashboard</p>  
</div>  
  
<div class="table-container">  
  
  <div class="table-header">  
    <div>ID</div>  
    <div>NAME</div>  
    <div>MATHS</div>  
    <div>CHEMISTRY</div>  
    <div>PHYSICS</div>  
    <div>BIOLOGY</div>  
    <div>TOTAL</div>  
    <div>AVERAGE</div>  
  </div>  
  
  <table id="studentDisplayTable">  
    <thead>  
      <tr>  
        <th>ID</th>  
        <th>NAME</th>  
        <th>MATHS</th>  
        <th>CHEMISTRY</th>  
        <th>PHYSICS</th>  
        <th>BIOLOGY</th>  
        <th>TOTAL</th>  
        <th>AVERAGE</th>  
      </tr>  
    </thead>  
    <tbody id="tableBody">  
      </tbody>  
  </table>  
  
</div>  

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";  
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";  
  
  const firebaseConfig = {  
    apiKey: "AIzaSyADbSzFOg0VLXm9YSLqRHg-5PEXKXIhwzk",  
    authDomain: "der-firebase.firebaseapp.com",  
    projectId: "der-firebase",  
    storageBucket: "der-firebase.firebasestorage.app",  
    messagingSenderId: "898462725543",  
    appId: "1:898462725543:web:e7741dc7191c71a70bf282"  
  };  
  
  const app = initializeApp(firebaseConfig);  
  const db = getDatabase(app);  
  const tbody = document.getElementById("tableBody");

  onValue(ref(db, "students"), (snapshot) => {
    tbody.innerHTML = "";
    snapshot.forEach((child) => {
      const data = child.val();
      tbody.innerHTML += `
        <tr>
          <td>${data.id || ''}</td>
          <td>${data.name || ''}</td>
          <td>${data.maths || 0}</td>
          <td>${data.chemistry || 0}</td>
          <td>${data.physics || 0}</td>
          <td>${data.biology || 0}</td>
          <td><strong>${data.total || 0}</strong></td>
          <td><strong>${Number(data.average).toFixed(1)}%</strong></td>
        </tr>
      `;
    });
  });
</script>
  
</body>  
</html>
