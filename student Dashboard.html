<!DOCTYPE html>
<html>
<head>
  <title>Sidebar Menu</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
    }

    /* Sidebar */

    .sidebar{
      width:250px;
      height:100vh;
      background:#0f172a;
      position:fixed;
      left:-250px;
      top:0;
      transition:0.3s;
      padding-top:20px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:15px 20px;
      font-size:18px;
    }

    .sidebar a:hover{
      background:#2563eb;
    }

    /* Open Sidebar */

    .sidebar.active{
      left:0;
    }

    /* Menu Button */

    .menu-btn{
      font-size:30px;
      cursor:pointer;
      padding:15px;
    }

  </style>

</head>

<body>

<!-- 3 Line Button -->

<div class="menu-btn" onclick="toggleMenu()">
  ☰
</div>

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

  <a href="#">Dashboard</a>

  <a href="#">Students</a>

  <a href="#">Subjects</a>

  <a href="#">Marks</a>

  <a href="#">Reports</a>

  <a href="#">Settings</a>

  <a href="#">Logout</a>

</div>

<script>

function toggleMenu(){

  document
    .getElementById("sidebar")
    .classList
    .toggle("active");

}

</script>

</body>
</html>
