<!DOCTYPE html>  
<html>  
<head>  
  <title>Login</title>  
  
  <style>  
  
    body{  
      font-family: Arial;  
      background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);  
      display:flex;  
      justify-content:center;  
      align-items:center;  
      height:100vh;  
      margin:0;  
      overflow:hidden;  
    }  
  
    .container{  
      width:350px;  
      background: rgba(255,255,255,0.12);  
      backdrop-filter: blur(12px);  
      padding:30px;  
      border-radius:20px;  
      box-shadow:0 10px 30px rgba(0,0,0,0.4);  
      border:1px solid rgba(255,255,255,0.2);  
  
      background-image: url("wmo.jpg");  
      background-size: cover;  
      background-repeat: no-repeat;  
      background-position: center;  
  
      animation: fadeIn 1s ease;  
    }  
  
    h1{  
      text-align:center;  
      margin-bottom:25px;  
      color:white;  
      font-size:35px;  
      letter-spacing:1px;  
      text-shadow:2px 2px 5px black;  
    }  
  
    input{  
      width:100%;  
      padding:12px;  
      margin-bottom:18px;  
      border:none;  
      border-radius:10px;  
      box-sizing:border-box;  
      background: rgba(255,255,255,0.85);  
      font-size:15px;  
      transition:0.3s;  
    }  
  
    input:focus{  
      outline:none;  
      box-shadow:0 0 10px #00bfff;  
      transform:scale(1.02);  
    }  
  
    button{  
      width:100%;  
      padding:12px;  
      border:none;  
      background: linear-gradient(45deg,#2563eb,#00bfff);  
      color:white;  
      border-radius:10px;  
      cursor:pointer;  
      font-size:17px;  
      font-weight:bold;  
      transition:0.3s;  
      box-shadow:0 5px 15px rgba(0,0,0,0.3);  
    }  
  
    button:hover{  
      background: linear-gradient(45deg,#1d4ed8,#38bdf8);  
      transform:translateY(-3px);  
    }  
  
    button:active{  
      transform:scale(0.98);  
      background:green;  
      color:black;  
    }  
  
    #message{  
      text-align:center;  
      margin-top:15px;  
      color:yellow;  
      font-weight:bold;  
      text-shadow:1px 1px 3px black;  
    }  
  
    @keyframes fadeIn{  
      from{  
        opacity:0;  
        transform:translateY(20px);  
      }  
      to{  
        opacity:1;  
        transform:translateY(0);  
      }  
    }  
  
  </style>  
  
</head>  
  
<body>  
  
<div class="container">  
  
  <h1>Login</h1>  
  
  <input type="email"  
         id="email"  
         placeholder="Enter Email">  
  
  <input type="password"  
         id="password"  
         placeholder="Enter Password">  
  
  <button id="loginBtn">  
  Login  
</button>  
  
  <p id="message"></p>  
  
</div>  
  
<script type="module">  
  
import { initializeApp }  
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";  
  
import {  
  getAuth,  
  signInWithEmailAndPassword  
}  
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";  
  
  
const firebaseConfig = {  
  apiKey: "AIzaSyADbSzFOg0VLXm9YSLqRHg-5PEXKXIhwzk",  
  authDomain: "der-firebase.firebaseapp.com",  
  projectId: "der-firebase",  
  storageBucket: "der-firebase.firebasestorage.app",  
  messagingSenderId: "898462725543",  
  appId: "1:898462725543:web:e7741dc7191c71a70bf282"  
};  
  
const app = initializeApp(firebaseConfig);  
const auth = getAuth(app);  
  
// ADMIN UID HERE  
const adminUIDs = [  
  "sFaPwsQ6cudCjIlgsgNK7k9asIu1"  
];  
  
function login(){  
  
  const email =  
    document.getElementById("email").value;  
  
  const password =  
    document.getElementById("password").value;  
  
  signInWithEmailAndPassword(auth, email, password)  
  
  .then((userCredential) => {  
  
  const user = userCredential.user;  
  
  document.getElementById("message").innerHTML =  
    "Login Successful";  
  
  // Check if admin  
  if (adminUIDs.includes(user.uid)) {  
    window.location.href = "Students Data.html";  
  } else {  
    window.location.href = "Student Dashboard.html";  
  }  
  
})  
  
  .catch((error)=>{  
  
    document.getElementById("message").innerHTML =  
      error.message;  
  
  });  
  
}  
  
document.getElementById("loginBtn")  
.addEventListener("click", login);  
  
</script>  
  
</body>  
</html>
