<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Student Arena Leaderboard</title>  
  
  <style>  
    body{  
      font-family:'Segoe UI',Arial,sans-serif;  
      background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);  
      padding:20px;  
      margin:0;  
      min-height:100vh;  
      color:white;  
    }  
  
    /* TOGGLE */  
    .menu-toggle{  
      width:40px;  
      height:30px;  
      position:fixed;  
      top:25px;  
      left:25px;  
      display:flex;  
      flex-direction:column;  
      justify-content:space-between;  
      cursor:pointer;  
      z-index:1001;  
    }  
  
    .menu-toggle span{  
      height:4px;  
      width:100%;  
      background:linear-gradient(45deg,#fff,#00bfff);  
      border-radius:10px;  
      box-shadow:0 0 8px #00bfff;  
      transition:.4s;  
    }  
  
    .menu-toggle.active span:nth-child(1){  
      transform:translateY(13px) rotate(45deg);  
    }  
  
    .menu-toggle.active span:nth-child(2){  
      opacity:0;  
    }  
  
    .menu-toggle.active span:nth-child(3){  
      opacity:0;  
    }  
  
    .menu-toggle.active span:nth-child(4){  
      transform:translateY(-13px) rotate(-45deg);  
    }  
  
    /* SIDEBAR */  
    .sidebar{  
      position:fixed;  
      top:0;  
      left:-250px;  
      width:220px;  
      height:100%;  
      background:rgba(15,23,42,.95);  
      backdrop-filter:blur(10px);  
      padding-top:80px;  
      transition:.4s;  
      z-index:1000;  
      box-shadow:5px 0 15px rgba(0,0,0,.5);  
    }  
  
    .sidebar.active{  
      left:0;  
    }  
  
    .sidebar a{  
      display:block;  
      padding:15px 25px;  
      color:white;  
      text-decoration:none;  
      font-size:18px;  
      border-bottom:1px solid rgba(255,255,255,.1);  
    }  
  
    .sidebar a:hover{  
      background:#00bfff;  
      color:black;  
      font-weight:bold;  
      padding-left:35px;  
    }  
  
    .container{  
      max-width:1200px;  
      margin:auto;  
    }  
  
    h1{  
      text-align:center;  
      font-size:42px;  
      text-transform:uppercase;  
      text-shadow:0 0 10px #fff,0 0 20px #38bdf8;  
    }  
  
    h2{  
      text-align:center;  
      color:#cbd5e1;  
      font-weight:300;  
    }  
  
    .leaderboard-title{  
      font-size:24px;  
      margin:30px 0 15px;  
      color:#38bdf8;  
      border-left:5px solid #38bdf8;  
      padding-left:10px;  
    }  
  
    .top-students-grid{  
      display:grid;  
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));  
      gap:15px;  
    }  
  
    .top-card{  
      background:rgba(255,255,255,.1);  
      backdrop-filter:blur(10px);  
      border:1px solid rgba(255,255,255,.15);  
      border-radius:15px;  
      padding:20px;  
      text-align:center;  
      transition:.3s;  
    }  
  
    .top-card:hover{  
      transform:translateY(-5px);  
    }  
  
    .rank-badge{  
      font-size:28px;  
    }  
  
    .rank-1{  
      color:#f59e0b;  
    }  
  
    .rank-2{  
      color:#cbd5e1;  
    }  
  
    .rank-3{  
      color:#b45309;  
    }  
  
    .rank-normal{  
      color:#38bdf8;  
    }  
  
    .student-name{  
      font-size:18px;  
      font-weight:bold;  
      margin:8px 0;  
    }  
  
    .student-score{  
      color:#cbd5e1;  
    }  
  
    .student-score span{  
      color:#00e5ff;  
      font-weight:bold;  
    }  
  
    .table-container{  
      overflow-x:auto;  
    }  
  
    table{  
      width:100%;  
      border-collapse:collapse;  
      background:rgba(255,255,255,.08);  
      backdrop-filter:blur(10px);  
    }  
  
    th,  
    td{  
      padding:14px;  
      text-align:center;  
      border:1px solid rgba(255,255,255,.1);  
    }  
  
    th{  
      background:linear-gradient(45deg,#2563eb,#00bfff);  
    }  
  
    tr:nth-child(even){  
      background:rgba(255,255,255,.04);  
    }  
  
    tr:hover{  
      background:rgba(255,255,255,.15);  
    }  
  </style>  
</head>  
  
<body>  
  
  <div class="menu-toggle" id="toggleBtn">  
    <span></span>  
    <span></span>  
    <span></span>  
    <span></span>  
  </div>  
  
  <div class="sidebar" id="sidebar">  
    <a href="register.html">🏠 Registration</a>  
    <a href="login.html">🚪 Login</a>  
  </div>  
  
  <div class="container">  
  
    <h1>Student Arena</h1>  
    <h2>Live Top 5 Rankings & Performance Dashboard</h2>  
  
    <div class="leaderboard-title">🏆 Top 5 Performers</div>  
    <div class="top-students-grid" id="topLeaderboard"></div>  
  
    <div class="leaderboard-title">📈 Performance Summary</div>  
  
    <div class="top-students-grid">  
      <div class="top-card">  
        <div class="rank-badge">✅</div>  
        <div class="student-name">Passed Students</div>  
        <div class="student-score">  
          <span id="passCount">0</span>  
        </div>  
      </div>  
  
      <div class="top-card">  
        <div class="rank-badge">❌</div>  
        <div class="student-name">Failed Students</div>  
        <div class="student-score">  
          <span id="failCount">0</span>  
        </div>  
      </div>  
  
      <div class="top-card">  
        <div class="rank-badge">📊</div>  
        <div class="student-name">Pass Percentage</div>  
        <div class="student-score">  
          <span id="passPercent">0%</span>  
        </div>  
      </div>  
    </div>  
  
    <div class="leaderboard-title">📊 Top 5 Standings Breakdown</div>  
  
    <div class="table-container">  
      <table id="studentTable">  
        <tr>  
          <th>Rank</th>  
          <th>Name</th>  
          <th>Maths</th>  
          <th>Chemistry</th>  
          <th>Physics</th>  
          <th>Biology</th>  
          <th>Total</th>  
          <th>Average</th>  
          <th>Status</th>  
        </tr>  
      </table>  
    </div>  
  
  </div>  
  
  <script type="module">  
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";  
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";  
  
    const firebaseConfig = {  
      apiKey: "AIzaSyADbSzFOg0VLXm9YSLqRHg-5PEXKXIhwzk",  
      authDomain: "der-firebase.firebaseapp.com",  
      projectId: "der-firebase",  
      storageBucket: "der-firebase.firebasestorage.app",  
      messagingSenderId: "898462725543",  
      appId: "1:898462725543:web:e7741dc7191c71a70bf282"  
    };  
  
    const app = initializeApp(firebaseConfig);  
    const db = getDatabase(app);  
  
    const table = document.getElementById("studentTable");  
    const leaderboardContainer = document.getElementById("topLeaderboard");  
  
    const passCountEl = document.getElementById("passCount");  
    const failCountEl = document.getElementById("failCount");  
    const passPercentEl = document.getElementById("passPercent");  
  
    const PASS_MARK = 80;  
  
    onValue(ref(db,"students"),(snapshot)=>{  
  
      let students=[];  
  
      snapshot.forEach((child)=>{  
        students.push(child.val());  
      });  
  
      students.sort((a,b)=>b.total-a.total);  
  
      /* PASS FAIL SUMMARY */  
      let passCount=0;  
      let failCount=0;  
  
      students.forEach(student=>{  
        if(Number(student.average)>=PASS_MARK){  
          passCount++;  
        }else{  
          failCount++;  
        }  
      });  
  
      const totalStudents=students.length;  
  
      const passPercentage =  
        totalStudents>0  
          ? ((passCount/totalStudents)*100).toFixed(1)  
          : 0;  
  
      passCountEl.textContent=passCount;  
      failCountEl.textContent=failCount;  
      passPercentEl.textContent=passPercentage+"%";  
  
      /* TOP 5 */  
      const topFive=students.slice(0,5);  
  
      leaderboardContainer.innerHTML="";  
  
      topFive.forEach((data,index)=>{  
  
        let badgeClass="rank-normal";  
        let rankDisplay=`#${index+1}`;  
  
        if(index===0){  
          badgeClass="rank-1";  
          rankDisplay="🥇";  
        }else if(index===1){  
          badgeClass="rank-2";  
          rankDisplay="🥈";  
        }else if(index===2){  
          badgeClass="rank-3";  
          rankDisplay="🥉";  
        }  
  
        leaderboardContainer.innerHTML+=`  
          <div class="top-card">  
            <div class="rank-badge ${badgeClass}">  
              ${rankDisplay}  
            </div>  
  
            <div class="student-name">  
              ${data.name}  
            </div>  
  
            <div class="student-score">  
              Total: <span>${data.total}</span>  
            </div>  
  
            <div class="student-score">  
              Avg: <span>${Number(data.average).toFixed(1)}%</span>  
            </div>  
          </div>  
        `;  
      });  
  
      /* TABLE */  
      table.innerHTML=`  
        <tr>  
          <th>Rank</th>  
          <th>Name</th>  
          <th>Maths</th>  
          <th>Chemistry</th>  
          <th>Physics</th>  
          <th>Biology</th>  
          <th>Total</th>  
          <th>Average</th>  
          <th>Status</th>  
        </tr>  
      `;  
  
      topFive.forEach((data,index)=>{  
  
        const status =  
          Number(data.average)>=80 ? "PASS" : "FAIL";  
  
        const statusColor =  
          Number(data.average)>=80 ? "#22c55e" : "#ef4444";  
  
        table.innerHTML+=`  
          <tr>  
            <td>${index+1}</td>  
            <td>${data.name}</td>  
            <td>${data.maths}</td>  
            <td>${data.chemistry}</td>  
            <td>${data.physics}</td>  
            <td>${data.biology}</td>  
            <td>${data.total}</td>  
            <td>${Number(data.average).toFixed(2)}%</td>  
            <td style="color:${statusColor};font-weight:bold;">  
              ${status}  
            </td>  
          </tr>  
        `;  
      });  
  
    });  
  </script>  
  
  <script>  
    document.getElementById("toggleBtn").addEventListener("click",function(){  
      document.getElementById("sidebar").classList.toggle("active");  
      this.classList.toggle("active");  
    });  
  </script>  
  
</body>  
</html>
